name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Policy enforcement job - runs first to fail fast
  policy-checks:
    name: Policy & Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for better diff analysis

      - name: Check for dangerous database patterns
        run: |
          echo "🔍 Checking for forbidden database patterns..."
          if grep -r "sequelize\.sync.*alter.*true" choir-app-backend/src/; then
            echo "❌ ERROR: sequelize.sync({ alter: true }) is forbidden!"
            echo "See doc/backend/DATABASE-MIGRATION-RULES.md for migration guide."
            exit 1
          fi
          if grep -r "\.sync({.*force.*true" choir-app-backend/src/ | grep -v "src/init/"; then
            echo "⚠️  WARNING: sync({ force: true }) found outside init/ directory"
            echo "This is dangerous in production code!"
            exit 1
          fi
          echo "✅ No dangerous database patterns detected"

      - name: Check for hardcoded secrets
        run: |
          echo "🔐 Checking for hardcoded secrets..."
          # Check for common secret patterns (excluding test files)
          if grep -rE "(password|secret|api[_-]?key|token)\s*=\s*['\"][^'\"]{8,}" \
             --exclude-dir=node_modules \
             --exclude-dir=tests \
             --exclude="*.test.js" \
             --exclude="*.spec.ts" \
             choir-app-backend/src/ choir-app-frontend/src/; then
            echo "❌ Potential hardcoded secrets detected!"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Verify required environment variable documentation
        run: |
          echo "📋 Checking .env documentation..."
          if [ ! -f "choir-app-backend/.env.example" ]; then
            echo "⚠️  WARNING: No .env.example file found"
            echo "Consider creating one for documentation"
          else
            echo "✅ Environment documentation exists"
          fi

      - name: Check for console.log in production code
        run: |
          echo "🧹 Checking for console.log statements..."
          # Allow console.log in tests, scripts, and specific files
          if find choir-app-frontend/src/app -name "*.ts" \
             -not -name "*.spec.ts" \
             -exec grep -l "console\.log" {} \; | grep -v ".spec.ts"; then
            echo "⚠️  WARNING: console.log found in production code"
            echo "Consider using proper logging service"
            # Don't fail, just warn
          fi

  # Backend tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: policy-checks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: choir-app-backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix choir-app-backend

      - name: Run backend tests
        run: npm test --prefix choir-app-backend

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: choir-app-backend/test-output.txt

  # Frontend tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: policy-checks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: choir-app-frontend/package-lock.json

      - name: Install Angular CLI dependencies
        run: npm ci --prefix choir-app-frontend

      - name: Generate build info
        run: npm run generate-build-info --prefix choir-app-frontend

      - name: Run Angular tests
        run: npm run test --prefix choir-app-frontend -- --watch=false --progress=false --browsers=ChromeHeadlessCI

      - name: Upload frontend test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: choir-app-frontend/coverage

  # Auto-label PRs
  labeler:
    name: Auto-label PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run labeler
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
