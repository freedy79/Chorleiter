<body>
  <noscript>
    <section aria-labelledby="noscript-title" style="font-family: Roboto, 'Helvetica Neue', sans-serif; line-height: 1.5; margin: 0 auto; max-width: 760px; padding: 2rem 1rem 3rem; color: #111827;">
      <header>
        <h1 id="noscript-title" style="margin-bottom: .5rem; color: #0f172a;">NAK Chorleiter</h1>
        <p style="margin-top: 0; color: #334155;">Digitale Chorverwaltung für Repertoire, Verfügbarkeiten und Einsatzplanung.</p>
      </header>

      <div role="alert" style="border: 1px solid #cbd5e1; border-left: 4px solid #1976d2; border-radius: .5rem; padding: 1rem; background: #f8fafc; margin: 1rem 0 1.5rem;">
        <h2 style="margin-top: 0; margin-bottom: .5rem; font-size: 1.1rem;">JavaScript ist deaktiviert</h2>
        <p style="margin: 0;">Für Login und die vollständige Nutzung wird JavaScript benötigt. Bitte aktiviere JavaScript oder erlaube Skripte für diese Seite.</p>
      </div>

      <section aria-labelledby="noscript-login-title" style="margin-bottom: 1.5rem;">
        <h2 id="noscript-login-title" style="font-size: 1.1rem; margin-bottom: .75rem;">Login (Grundansicht)</h2>
        <form action="/login" method="get" aria-describedby="noscript-login-help" style="display: grid; gap: .75rem;">
          <label for="noscript-email">E-Mail</label>
          <input id="noscript-email" name="email" type="email" autocomplete="email" disabled style="padding: .65rem .75rem; border: 1px solid #cbd5e1; border-radius: .375rem;">

          <label for="noscript-password">Passwort</label>
          <input id="noscript-password" name="password" type="password" autocomplete="current-password" disabled style="padding: .65rem .75rem; border: 1px solid #cbd5e1; border-radius: .375rem;">

          <p id="noscript-login-help" style="margin: 0; color: #475569;">Das Formular ist ohne JavaScript nicht nutzbar und dient als barrierearme Vorschau der Login-Funktion.</p>
          <button type="submit" style="width: fit-content; border: 0; border-radius: .375rem; padding: .65rem 1rem; background: #1976d2; color: #fff; cursor: pointer;">Zur Login-Seite</button>
        </form>
      </section>

      <section aria-labelledby="noscript-help-title">
        <h2 id="noscript-help-title" style="font-size: 1.1rem; margin-bottom: .75rem;">Hilfe &amp; Systemanforderungen</h2>
        <ul style="padding-left: 1.25rem; margin-top: 0;">
          <li>Aktueller Browser (Chrome, Edge, Firefox oder Safari in aktueller Version)</li>
          <li>JavaScript aktiviert</li>
          <li>Stabile Internetverbindung</li>
        </ul>
        <p style="margin-bottom: 0;">
          <a href="/imprint">Kontakt &amp; Support</a>
          · <a href="/privacy">Datenschutz</a>
          · <a href="/api/health" rel="nofollow">Systemstatus (API)</a>
        </p>
      </section>
    </section>
  </noscript>

  <app-root></app-root>
</body>
</html>
