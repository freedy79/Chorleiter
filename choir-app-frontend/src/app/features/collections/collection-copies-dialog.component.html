<h1 mat-dialog-title>Exemplare verwalten</h1>
<div mat-dialog-content>
  <mat-tab-group>
    <mat-tab label="Druckexemplare">
      <table mat-table [dataSource]="copies" class="mat-elevation-z8">
        <ng-container matColumnDef="number">
          <th mat-header-cell *matHeaderCellDef>Nr.</th>
          <td mat-cell *matCellDef="let c">{{ c.copyNumber }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let c">
            <input
              matInput
              [(ngModel)]="c.borrowerName"
              [matAutocomplete]="auto"
              (blur)="onNameBlur(c)"
              [readonly]="!!c.borrowerName"
            />

            <mat-autocomplete
              #auto="matAutocomplete"
              (optionSelected)="onNameSelected(c, $event)"
            >
              <mat-option *ngFor="let m of members" [value]="fullName(m)">
                {{ fullName(m) }}
              </mat-option>
            </mat-autocomplete>
          </td>
        </ng-container>

        <ng-container matColumnDef="borrowed">
          <th mat-header-cell *matHeaderCellDef>Ausleihe</th>
          <td mat-cell *matCellDef="let c">{{ c.borrowedAt | date: 'dd.MM.yyyy' }}</td>
        </ng-container>

        <ng-container matColumnDef="returned">
          <th mat-header-cell *matHeaderCellDef>Rückgabe</th>
          <td mat-cell *matCellDef="let c">{{ c.returnedAt | date: 'dd.MM.yyyy' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let c">
            <button mat-button color="primary" (click)="returnCopy(c)" *ngIf="c.borrowerName">Rückgabe</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <mat-autocomplete #auto="matAutocomplete">
        <mat-option *ngFor="let m of members" [value]="fullName(m)">
          {{ fullName(m) }}
        </mat-option>
      </mat-autocomplete>
    </mat-tab>

    <mat-tab label="Digitale Lizenzen">
      <div class="license-create-row" style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:12px;">
        <mat-form-field>
          <mat-label>Lizenznummer</mat-label>
          <input matInput [(ngModel)]="newLicense.licenseNumber" />
        </mat-form-field>
        <mat-form-field>
          <mat-label>Lizenztyp</mat-label>
          <mat-select [(ngModel)]="newLicense.licenseType">
            <mat-option *ngFor="let type of licenseTypes" [value]="type">{{ type }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Menge</mat-label>
          <input matInput type="number" [(ngModel)]="newLicense.quantity" />
        </mat-form-field>
        <button mat-flat-button color="primary" (click)="createDigitalLicense()">Anlegen</button>
      </div>

      <table mat-table [dataSource]="digitalLicenses" class="mat-elevation-z8">
        <ng-container matColumnDef="licenseNumber">
          <th mat-header-cell *matHeaderCellDef>Lizenznummer</th>
          <td mat-cell *matCellDef="let l">
            <input matInput [(ngModel)]="l.licenseNumber" />
          </td>
        </ng-container>

        <ng-container matColumnDef="licenseType">
          <th mat-header-cell *matHeaderCellDef>Typ</th>
          <td mat-cell *matCellDef="let l">
            <mat-select [(ngModel)]="l.licenseType">
              <mat-option *ngFor="let type of licenseTypes" [value]="type">{{ type }}</mat-option>
            </mat-select>
          </td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Menge</th>
          <td mat-cell *matCellDef="let l">
            <input matInput type="number" [(ngModel)]="l.quantity" />
          </td>
        </ng-container>

        <ng-container matColumnDef="validity">
          <th mat-header-cell *matHeaderCellDef>Gültigkeit</th>
          <td mat-cell *matCellDef="let l">
            <div style="display:flex;gap:8px;align-items:center;">
              <input matInput type="date" [(ngModel)]="l.validFrom" />
              <span>–</span>
              <input matInput type="date" [(ngModel)]="l.validUntil" />
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="document">
          <th mat-header-cell *matHeaderCellDef>Lizenz-PDF</th>
          <td mat-cell *matCellDef="let l">
            <input #fileInput type="file" accept="application/pdf,.pdf" hidden (change)="uploadLicenseFile(l, $event)" />
            <button mat-stroked-button (click)="fileInput.click()">Upload</button>
            <button mat-button color="primary" *ngIf="l.documentPath" (click)="downloadLicenseFile(l)">
              Download
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let l" style="display:flex;gap:8px;">
            <button mat-stroked-button color="primary" (click)="saveDigitalLicense(l)">Speichern</button>
            <button mat-stroked-button color="warn" (click)="deleteDigitalLicense(l)">Löschen</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="digitalDisplayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: digitalDisplayedColumns"></tr>
      </table>
    </mat-tab>
  </mat-tab-group>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="print()">Ausleihliste drucken</button>
  <button mat-button color="primary" (click)="adjustCopies()">Exemplare anpassen</button>
  <span class="spacer"></span>
  <button mat-button (click)="close()">Schließen</button>
</div>
