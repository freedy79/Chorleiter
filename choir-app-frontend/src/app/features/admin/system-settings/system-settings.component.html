<div class="system-settings">
  <app-admin-page-header
    title="Systemeinstellungen"
    description="PayPal, Frontend-URLs, Imprint und weitere Systemkonfigurationen">
  </app-admin-page-header>

  <mat-tab-group (selectedTabChange)="onTabChange($event)" [selectedIndex]="selectedTabIndex">

    <!-- Frontend-URLs Tab -->
    <mat-tab label="Frontend URLs">
      <ng-template mat-tab-label>
        <mat-icon matTabLabelPadding>language</mat-icon>
        <span class="tab-label">URLs</span>
      </ng-template>
      <div class="tab-content">
        <app-frontend-url-settings></app-frontend-url-settings>
      </div>
    </mat-tab>

    <!-- PayPal Tab -->
    <mat-tab label="PayPal">
      <ng-template mat-tab-label>
        <mat-icon matTabLabelPadding>payment</mat-icon>
        <span class="tab-label">PayPal</span>
      </ng-template>
      <div class="tab-content">
        <app-paypal-settings></app-paypal-settings>
      </div>
    </mat-tab>

    <!-- Imprint Tab -->
    <mat-tab label="Imprint">
      <ng-template mat-tab-label>
        <mat-icon matTabLabelPadding>description</mat-icon>
        <span class="tab-label">Imprint</span>
      </ng-template>
      <div class="tab-content">
        <app-imprint-settings></app-imprint-settings>
      </div>
    </mat-tab>

    <!-- Privacy Policy Tab -->
    <mat-tab label="Datenschutz">
      <ng-template mat-tab-label>
        <mat-icon matTabLabelPadding>shield</mat-icon>
        <span class="tab-label">Datenschutz</span>
      </ng-template>
      <div class="tab-content">
        <app-privacy-settings></app-privacy-settings>
      </div>
    </mat-tab>

    <!-- Entwicklung Tab -->
    <mat-tab label="Entwicklung">
      <ng-template mat-tab-label>
        <mat-icon matTabLabelPadding>code</mat-icon>
        <span class="tab-label">Dev</span>
      </ng-template>
      <div class="tab-content">
        <app-develop></app-develop>
      </div>
    </mat-tab>

    <!-- CKEditor License Tab -->
    <mat-tab label="CKEditor">
      <ng-template mat-tab-label>
        <mat-icon matTabLabelPadding>vpn_key</mat-icon>
        <span class="tab-label">CKEditor</span>
      </ng-template>
      <div class="tab-content">
        <app-ckeditor-license-settings></app-ckeditor-license-settings>
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
